<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .welcome-card {
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .welcome-icon {
            font-size: 60px;
            margin-bottom: 16px;
        }
        .welcome-card h2 {
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        .welcome-card p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .btn-logout {
            padding: 10px 30px;
            font-size: 15px;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            text-decoration: none;
        }
        .btn-logout:hover {
            background-color: #c0392b;
            color: white;
        }
        .badge-user {
            background-color: #4A90E2;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="welcome-icon">🎉</div>
        <div class="badge-user">
            Logged in as: <strong th:text="${username}">User</strong>
        </div>
        <h2>Welcome!</h2>
        <p>You have successfully logged in. <br> Hope you have a great day!</p>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
