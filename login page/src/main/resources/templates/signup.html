<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for eye icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .signup-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .signup-card h2 {
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
            color: #333;
        }
        .signup-card p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .btn-signup {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background-color: #4A90E2;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
        }
        .btn-signup:hover {
            background-color: #357ABD;
            color: white;
        }
        .btn-back {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background-color: #ffffff;
            border: 2px solid #4A90E2;
            border-radius: 8px;
            color: #4A90E2;
            font-weight: 600;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-back:hover {
            background-color: #eef4fc;
            color: #4A90E2;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
        }
        .alert {
            border-radius: 8px;
            font-size: 14px;
        }

        /* Password field wrapper */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-right: 44px;
        }

        /* Eye toggle button */
        .eye-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: #aaa;
            font-size: 17px;
            line-height: 1;
            transition: color 0.2s;
        }
        .eye-toggle:hover {
            color: #4A90E2;
        }

        /* Closed cat eye - default gray */
        .eye-toggle .fa-eye-slash {
            color: #bbb;
        }
        /* Open cat eye - blue when holding */
        .eye-toggle .fa-eye {
            color: #4A90E2;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>Create Account</h2>
        <p class="subtitle">Fill in the details to sign up</p>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>

        <!-- Signup Form -->
        <form th:action="@{/signup}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       placeholder="Choose a username"
                       required autofocus>
            </div>

            <!-- Password Field with Eye Toggle -->
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="password-wrapper">
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Choose a password"
                           required>
                    <button type="button" class="eye-toggle"
                            onmousedown="showPassword('password', this)"
                            onmouseup="hidePassword('password', this)"
                            onmouseleave="hidePassword('password', this)"
                            ontouchstart="showPassword('password', this)"
                            ontouchend="hidePassword('password', this)"
                            title="Hold to show password">
                        <i class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password Field with Eye Toggle -->
            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           class="form-control"
                           placeholder="Re-enter your password"
                           required>
                    <button type="button" class="eye-toggle"
                            onmousedown="showPassword('confirmPassword', this)"
                            onmouseup="hidePassword('confirmPassword', this)"
                            onmouseleave="hidePassword('confirmPassword', this)"
                            ontouchstart="showPassword('confirmPassword', this)"
                            ontouchend="hidePassword('confirmPassword', this)"
                            title="Hold to show password">
                        <i class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-signup mb-3">Sign Up</button>
        </form>

        <p class="text-center" style="font-size: 13px; color: #aaa;">Already have an account?</p>
        <a href="/" class="btn-back">Back to Login</a>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Show password while holding the button
        function showPassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const icon  = btn.querySelector('i');
            input.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }

        // Hide password when button is released
        function hidePassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const icon  = btn.querySelector('i');
            input.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    </script>
</body>
</html>
